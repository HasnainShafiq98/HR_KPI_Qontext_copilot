<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextOS Console</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>ContextOS Console</h1>
      <p>Inspectable enterprise memory for humans and agents.</p>
    </header>

    <main>
      <section class="card">
        <h2>Memory Buckets</h2>
        <ul>
          <li><code>/static</code> employees, customers, products</li>
          <li><code>/procedural</code> policies and SOPs</li>
          <li><code>/trajectory</code> projects, tickets, tasks</li>
        </ul>
      </section>

      <section class="card">
        <h2>Context Health</h2>
        <pre id="health">Loading...</pre>
      </section>

      <section class="card">
        <h2>Open Conflicts</h2>
        <pre id="conflicts">Loading...</pre>
      </section>

      <section class="card wide">
        <h2>Agent Query (MVP)</h2>
        <input id="queryInput" type="text" placeholder="Ask about an employee, policy, or task" />
        <button id="queryBtn">Run Query</button>
        <pre id="queryResult"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
